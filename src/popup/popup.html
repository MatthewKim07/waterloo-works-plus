<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaterlooWorks+</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/icon-16.png" />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="brand">
        <img src="../assets/icons/icon-48.png" alt="" class="brand-mark" />
        <div>
          <h1>WaterlooWorks+</h1>
          <p class="subtitle">Quick controls</p>
        </div>
      </header>

      <section class="controls">
        <button id="toggleExtensionBtn" type="button">Disable extension</button>
        <button id="openAppBtn" type="button" class="secondary">Open WaterlooWorks+ App</button>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="../shared/schema.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
