<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaterlooWorks+ Options</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/icon-16.png" />
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>WaterlooWorks+ Settings</h1>
        <p>Configure resume matching and ranking preferences.</p>
      </header>

      <section class="card">
        <h2>Extension Controls</h2>
        <label class="row">
          <input type="checkbox" id="enabledToggle" />
          <span>Enable WaterlooWorks+</span>
        </label>
        <label class="row">
          <input type="checkbox" id="flagLocalSemanticAI" />
          <span>Use local semantic AI boost for matching (free, experimental)</span>
        </label>
      </section>

      <section class="card">
        <h2>Resume Input</h2>
        <label class="label" for="resumeUpload">Upload Resume (PDF, DOCX, TXT)</label>
        <input id="resumeUpload" type="file" accept=".pdf,.docx,.txt" />

        <label class="label" for="resumeText">Or Paste Resume Text</label>
        <textarea id="resumeText" rows="10" placeholder="Paste resume content..."></textarea>

        <div class="actions">
          <button id="parseResumeBtn" type="button">Parse Resume</button>
          <button id="clearResumeBtn" type="button" class="secondary">Clear Resume</button>
        </div>

        <p id="resumeStatus" class="status"></p>

        <div class="skill-editor">
          <div class="skill-editor-head">
            <h3>Skill Controls</h3>
            <p id="skillsSummary" class="status"></p>
          </div>

          <label class="label" for="skillInput">Add Skill (suggested or custom)</label>
          <div class="skill-add-row">
            <div class="autocomplete">
              <input id="skillInput" type="text" placeholder="e.g., react native, kubernetes, fastapi" autocomplete="off" />
              <div id="skillAutocomplete" class="autocomplete-list" hidden></div>
            </div>
            <button id="addSkillBtn" type="button" class="secondary">Add Skill</button>
          </div>
          <p id="skillEditStatus" class="status"></p>

          <div class="skill-legend" role="note" aria-label="Skill source legend">
            <span class="legend-item"><span class="legend-swatch legend-swatch-parsed"></span>Parsed from resume (click chip to hide)</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch-manual"></span>Manual skill (click chip to remove)</span>
          </div>

          <label class="label">Active Skills Used For Matching (editable)</label>
          <div id="skillsPreview" class="chips"></div>

          <label class="label">Hidden Parsed Skills (not used for matching, click to restore)</label>
          <div id="hiddenParsedSkillsPreview" class="chips"></div>
        </div>
      </section>

      <section class="card">
        <h2>Preferences</h2>
        <div class="grid">
          <label>
            Work Term Number
            <select id="workTerm">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6+</option>
            </select>
          </label>

          <label>
            Faculty
            <div class="autocomplete">
              <input id="faculty" type="text" placeholder="Select faculty..." autocomplete="off" />
              <div id="facultyAutocomplete" class="autocomplete-list" hidden></div>
            </div>
          </label>

          <label>
            Target Role
            <input id="targetRole" type="text" placeholder="Software Engineer, Data Analyst..." />
          </label>

          <label>
            Industry Preferences (comma-separated)
            <input id="industries" type="text" placeholder="Fintech, Health, Robotics" />
          </label>
        </div>

        <fieldset>
          <legend>Preferred Work Term Length</legend>
          <label><input type="radio" name="termLength" value="4" checked /> 4 months</label>
          <label><input type="radio" name="termLength" value="8" /> 8 months</label>
          <label><input type="radio" name="termLength" value="either" /> Either</label>
        </fieldset>

        <div class="actions">
          <button id="savePrefsBtn" type="button">Save Preferences</button>
        </div>
        <p id="prefsStatus" class="status"></p>
      </section>
    </main>

    <script src="../shared/schema.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="../shared/skills.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="../vendor/fflate.js"></script>
    <script src="../shared/resume-parser.js"></script>
    <script src="./options.js"></script>
  </body>
</html>
